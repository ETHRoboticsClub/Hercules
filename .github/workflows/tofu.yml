# OpenTofu CI/CD — validate + plan on every push/PR; apply on merge to master.
# Required secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#                   TF_STATE_BUCKET, TF_STATE_LOCK_TABLE, ML_DATA_BUCKET_NAME

name: OpenTofu

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# One run per branch at a time. Cancel in-progress PR runs on new push;
# let master runs finish so apply is never interrupted mid-way.
concurrency:
  group: tofu-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  AWS_REGION: us-east-1
  TF_INPUT: "false"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Init
        run: tofu init -backend=false

      - name: Validate
        run: tofu validate

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Init
        run: tofu init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Plan
        id: plan
        run: |
          set -o pipefail
          tofu plan -no-color \
            -var="ml_data_bucket_name=${{ secrets.ML_DATA_BUCKET_NAME }}" \
            2>&1 | tee plan.txt

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs  = require('fs');
            const raw = fs.readFileSync('plan.txt', 'utf8');
            const max = 65000;
            const out = raw.length > max
              ? raw.slice(0, max) + '\n\n…output truncated, see full logs'
              : raw;

            const marker = '<!-- tofu-plan -->';
            const body   = `${marker}\n### OpenTofu Plan\n\`\`\`\n${out}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.filter(c => c.body.includes(marker))) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: c.id,
              });
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: [validate, plan]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Init
        run: tofu init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Apply
        run: tofu apply -auto-approve
          -var="ml_data_bucket_name=${{ secrets.ML_DATA_BUCKET_NAME }}"
